<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles3.css">
</head>

<body>
    <section>
        <h1>My To-Do List</h1>

        <ul class="todo-list">
            <li class="task">
                <input type="checkbox" id="1">
                <label for="1">Explore gaming keyboards</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://www.amazon.com/" target="_blank">Store link</a>
                    </li>
                </ul>
            </li>
            <li class="task">
                <input type="checkbox" id="2">
                <label for="2">Finish the report</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://www.freecodecamp.org/espanol" target="_blank">Request
                            Access</a>
                    </li>
                </ul>
            </li>
            <li class="task">
                <input type="checkbox" id="3">
                <label for="3">View Phone's Warranty</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://www.pinterest.com/" target="_blank">View Receipts</a>
                    </li>
                </ul>
            </li>
            <li class="task">
                <input type="checkbox" id="4">
                <label for="4">Check Processor Specs</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://www.google.com/" target="_blank">View Model Number</a>
                    </li>
                </ul>
            </li>
        
            

        </ul>

    </section>


</body>

</html>
